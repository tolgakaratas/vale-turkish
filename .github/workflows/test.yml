name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Vale
      run: |
        wget https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz
        tar -xvzf vale_3.9.0_Linux_64-bit.tar.gz
        sudo mv vale /usr/local/bin/
        vale --version

    - name: Install Hunspell Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y hunspell hunspell-tr

    - name: Configure Vale
      run: |
        # Use local config for testing
        echo "StylesPath = styles" > .vale.ini
        echo "MinAlertLevel = suggestion" >> .vale.ini
        echo "[*.md]" >> .vale.ini
        echo "BasedOnStyles = Turkish" >> .vale.ini
        # Disable spelling for CI to avoid hunspell dependency issues
        echo "Turkish.Spelling = NO" >> .vale.ini

    - name: Run Vale on Clean File (Should Pass)
      run: vale fixtures/clean.md

    - name: Run Vale on Dirty File (Should Fail)
      run: |
        if vale fixtures/dirty.md; then
          echo "Hata: Vale dirty.md'de hata bulmasi gerekirdi"
          exit 1
        else
          echo "Basarili: Vale dirty.md'de hatalari dogru sekilde yakaladi"
        fi

  test-precommit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Vale
      run: |
        wget -q https://github.com/errata-ai/vale/releases/download/v3.9.0/vale_3.9.0_Linux_64-bit.tar.gz
        tar -xzf vale_3.9.0_Linux_64-bit.tar.gz
        sudo mv vale /usr/local/bin/

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Test hook script directly (clean)
      run: |
        VALE_TURKISH_NO_SPELLING=1 ./hooks/vale-turkish.sh fixtures/clean.md

    - name: Test hook script directly (dirty - should fail)
      run: |
        VALE_TURKISH_NO_SPELLING=1 ./hooks/vale-turkish.sh fixtures/dirty.md && exit 1 || echo "Basarili: dirty.md'de hatalar bulundu"

    - name: Test pre-commit hook (clean)
      run: |
        VALE_TURKISH_NO_SPELLING=1 pre-commit try-repo . vale-turkish --files fixtures/clean.md

    - name: Test pre-commit hook (dirty - should fail)
      run: |
        VALE_TURKISH_NO_SPELLING=1 pre-commit try-repo . vale-turkish --files fixtures/dirty.md && exit 1 || echo "Basarili: pre-commit hook hatalari yakaladi"

  test-action:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Test GitHub Action (clean)
      uses: ./
      with:
        files: fixtures/clean.md
        no_spelling: 'true'
