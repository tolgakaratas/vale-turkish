extends: substitution
# Parametre sırası: 1. Öneri (Doğru), 2. Eşleşen (Yanlış)
message: "📝 Yazım kuralını kontrol edin: '%s' kullanın ('%s' yerine)"
level: error
link: https://www.tdk.gov.tr/icerik/yazim-kurallari/
ignorecase: true
swap:
  # Ayrı yazılması gerekenler
  birşey: bir şey
  herşey: her şey
  hiçbirşey: hiçbir şey
  herzaman: her zaman
  birgün: bir gün
  hiçbirzaman: hiçbir zaman
  okadar: o kadar
  bukadar: bu kadar
  şukadar: şu kadar
  nekadar: ne kadar
  hiçkimse: hiç kimse
  herhangibir: herhangi bir

  # Bitişik yazılması gerekenler
  bir kaç: birkaç
  bir çok: birçok
  hiç bir: hiçbir
  her hangi: herhangi
  bir takım: birtakım
  vaz geçmek: vazgeçmek
  nasıl ki: nasılki
  öyle ki: öyleki
  şöyle ki: şöyleki

