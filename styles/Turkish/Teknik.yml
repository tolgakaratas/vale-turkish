# Teknik Terimler
# Yazılım dünyasındaki terimlerin doğru yazılışları
# 💎 GELİŞTİRME İLKESİ: Sadece ekleyerek zenginleştiriyoruz. 
# Hatalı olanı düzeltmek dışında hiçbir veriyi silmiyoruz. 
# Sürekli yeni geliştirmelere açığız ve bu yapıyı büyüterek zenginleştiriyoruz.

