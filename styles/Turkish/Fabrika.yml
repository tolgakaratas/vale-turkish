  cycle time: çevrim süresi
  throughput: çıktı
  bottleneck: darboğaz
  downtime: duruş süresi
  kaizen: sürekli iyileştirme
  poka-yoke: hata önleyici

  # Kalite ve Operasyon
  start vermek: başlatmak
  stop etmek: durdurmak
  okeylemek: onaylamak
  approve etmek: onaylamak
  revizyon: yenileme
  on-hold: beklemede
  scrap: hurda
  rework: yeniden işleme
  batch: parti
