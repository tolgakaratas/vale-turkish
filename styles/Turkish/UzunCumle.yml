# Uzun Cümle Kontrolü
# 30 kelimeden uzun cümleler için uyarı verir.
# Okunabilirliği artırmak için cümleleri bölmeyi önerir.

extends: existence
message: "☕️ Bu cümle biraz uzun mu olmuş ne? (%s+ kelime). Okuyucuya nefes aldırmak için bölmeyi düşünebilirsin."
level: warning
scope: sentence
tokens:
  # 30 kelime ve üzeri (boşluk sayısına göre basit tespit)
  - '(?:\S+\s+){30,}\S+'
