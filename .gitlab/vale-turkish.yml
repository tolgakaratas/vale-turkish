# Vale Turkish - GitLab CI Şablonu
#
# Kullanım:
#   include:
#     - remote: 'https://raw.githubusercontent.com/tolgakaratas/vale-turkish/v1.1.0/.gitlab/vale-turkish.yml'
#
#   vale-turkish:
#     extends: .vale-turkish
#     variables:
#       VALE_FILES: "docs/"
#       MIN_ALERT_LEVEL: "warning"
#
# Docker executor için image: alpine:latest kullanılır.
# Shell executor için sisteminizde wget/curl ve bash olmalıdır.

.vale-turkish:
  variables:
    VALE_VERSION: "3.9.0"
    MIN_ALERT_LEVEL: "suggestion"
    VALE_FILES: "."
    VALE_TURKISH_VERSION: "v1.1.0"
    VALE_TURKISH_NO_SPELLING: "0"
  script:
    - |
      # Vale'i kur (sistem, Docker veya otomatik indirme)
      if command -v vale >/dev/null 2>&1; then
        echo "Vale zaten kurulu: $(vale --version)"
      elif command -v apk >/dev/null 2>&1; then
        # Alpine (Docker executor)
        apk add --no-cache wget bash tar
        wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        tar -xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        mv vale /usr/local/bin/
        rm -f "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
      else
        # Debian/Ubuntu/diğer Linux (shell executor)
        wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" || \
          curl -fsSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -o "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        tar -xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        mkdir -p "${HOME}/.local/bin"
        mv vale "${HOME}/.local/bin/"
        export PATH="${HOME}/.local/bin:${PATH}"
        rm -f "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
      fi

      if ! command -v vale >/dev/null 2>&1; then
        echo "Hata: Vale kurulamadı."
        exit 1
        echo "Desteklenmeyen ortam. wget veya curl kurulu olmalıdır."
        exit 1
      fi

      # vale-turkish stillerini indir
      wget -q "https://github.com/tolgakaratas/vale-turkish/archive/refs/tags/${VALE_TURKISH_VERSION}.tar.gz" -O vale-turkish.tar.gz || \
        curl -fsSL "https://github.com/tolgakaratas/vale-turkish/archive/refs/tags/${VALE_TURKISH_VERSION}.tar.gz" -o vale-turkish.tar.gz
      tar -xzf vale-turkish.tar.gz
      STYLES_DIR="$(pwd)/vale-turkish-${VALE_TURKISH_VERSION#v}/styles"

      # Spelling devre dışı bırakma
      SPELLING_LINE=""
      if [ "${VALE_TURKISH_NO_SPELLING}" = "1" ]; then
        SPELLING_LINE="Turkish.Spelling = NO"
      fi

      # Geçici config oluştur
      {
        echo "StylesPath = ${STYLES_DIR}"
        echo "MinAlertLevel = ${MIN_ALERT_LEVEL}"
        echo "Vocab = Turkish"
        echo ""
        echo "[*.md]"
        echo "BasedOnStyles = Turkish"
        [ -n "${SPELLING_LINE}" ] && echo "${SPELLING_LINE}"
        echo ""
        echo "[*.txt]"
        echo "BasedOnStyles = Turkish"
        [ -n "${SPELLING_LINE}" ] && echo "${SPELLING_LINE}"
      } > /tmp/vale-turkish.ini

      # Vale'i JSON ile çalıştır ve raporları üret
      VALE_EXIT=0
      vale --config=/tmp/vale-turkish.ini --output=JSON ${VALE_FILES} > /tmp/vale-results.json 2>&1 || VALE_EXIT=$?

      # Sonuçları göster (insan okunur)
      vale --config=/tmp/vale-turkish.ini ${VALE_FILES} || true

      # JUnit XML raporu (GitLab Tests sekmesi)
      if command -v jq >/dev/null 2>&1 && [ -s /tmp/vale-results.json ]; then
        SCRIPT_DIR="$(pwd)/vale-turkish-${VALE_TURKISH_VERSION#v}/scripts"
        if [ -f "${SCRIPT_DIR}/vale-to-junit.sh" ]; then
          bash "${SCRIPT_DIR}/vale-to-junit.sh" /tmp/vale-results.json > junit.xml
        fi
        if [ -f "${SCRIPT_DIR}/vale-to-codeclimate.sh" ]; then
          bash "${SCRIPT_DIR}/vale-to-codeclimate.sh" /tmp/vale-results.json > gl-code-quality-report.json
        fi
      fi

      exit $VALE_EXIT
  artifacts:
    when: always
    reports:
      junit: junit.xml
      codequality: gl-code-quality-report.json
    paths:
      - junit.xml
      - gl-code-quality-report.json
    expire_in: 30 days
