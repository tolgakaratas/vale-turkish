# Vale Türkçe Konfigürasyon
# https://github.com/tolgakaratas/vale-turkce-ayarlar

StylesPath = styles
MinAlertLevel = suggestion

# Türkçe markdown dosyaları (.tr.md uzantılı)
[*.tr.md]
BasedOnStyles = Turkce

# turkce/ klasöründeki tüm dosyalar
[turkce/*.md]
BasedOnStyles = Turkce

[turkce/*.txt]
BasedOnStyles = Turkce

# İsteğe bağlı: Tüm markdown dosyaları için Türkçe kuralları aktif et
# [*.md]
# BasedOnStyles = Turkce
