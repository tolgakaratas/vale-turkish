# Vale Türkçe Konfigürasyon
# https://github.com/tolgakaratas/vale-turkce-ayarlar

StylesPath = styles
MinAlertLevel = suggestion
Vocab = Turkish

# Türkçe markdown dosyaları (.tr.md uzantılı)
[*.tr.md]
BasedOnStyles = Turkish

# turkce/ klasöründeki tüm dosyalar
[turkce/*.md]
BasedOnStyles = Turkish

[turkce/*.txt]
BasedOnStyles = Turkish

# Test için: Tüm markdown dosyalarında aktifleştir
[*.md]
BasedOnStyles = Turkish
